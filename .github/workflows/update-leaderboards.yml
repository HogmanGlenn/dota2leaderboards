name: Refresh leaderboard data

on:
  schedule:
    - cron: "19,49 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: leaderboard-refresh
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Check out master
        uses: actions/checkout@v7
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test updater
        run: python -m unittest discover -s scripts -p "test_*.py"

      - name: Download and validate leaderboards
        run: python scripts/update_leaderboards.py --timeout 20 --attempts 2

      - name: Commit updated data
        id: commit
        shell: bash
        run: |
          if git diff --quiet -- public/data; then
            echo "Leaderboard data is already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "Update leaderboard data"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: master
